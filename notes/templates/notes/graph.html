{% extends 'base.html' %}

{% block title %}Граф связей - Quartz{% endblock %}

{% block content %}
<div id="mynetwork" style="width: 100%; height: 100vh; background-color: #1e1e1e;"></div>

<script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<script type="text/javascript">
    document.addEventListener('DOMContentLoaded', function() {
        fetch("{% url 'graph_data' %}")
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('mynetwork');
                const options = {
                    nodes: {
                        shape: 'dot',
                        size: 20,
                        font: { size: 14, color: '#ffffff' },
                        borderWidth: 2,
                        shadow: true,
                        color: {
                            background: '#7d4698',
                            border: '#333333',
                            highlight: { background: '#9d66b8', border: '#ffffff' }
                        }
                    },
                    edges: {
                        color: '#444444',
                        width: 1,
                        smooth: { type: 'continuous' },
                        hoverWidth: 2
                    },
                    physics: {
                        enabled: true,
                        barnesHut: {
                            gravitationalConstant: -2000,
                            centralGravity: 0.3,
                            springLength: 95
                        },
                        stabilization: { iterations: 200 }
                    },
                    interaction: {
                        hover: true,
                        tooltipDelay: 200
                    }
                };
                
                const network = new vis.Network(container, data, options);
                
                network.on("click", function (params) {
                    if (params.nodes.length > 0) {
                        const nodeId = params.nodes[0];
                        window.location.href = `/notes/${nodeId}/`;
                    }
                });
                
                // Изменение курсора при наведении на узлы
                network.on("hoverNode", function () {
                    container.style.cursor = 'pointer';
                });
                network.on("blurNode", function () {
                    container.style.cursor = 'default';
                });
            });
    });
</script>
{% endblock %}
