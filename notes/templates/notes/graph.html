{% extends 'base.html' %}
{% load static %}

{% block title %}Граф связей - Quartz{% endblock %}

{% block extra_head %}
<link rel="stylesheet" href="{% static 'css/graph.css' %}">
{% endblock %}

{% block content %}
<div class="graph-page-wrap">

    <div id="mynetwork"
         data-graph-data-url="{% url 'graph_data' %}"
         data-note-url-base="/notes/"></div>

    <div class="graph-settings-panel">
        <div class="settings-header" onclick="toggleSettings()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            <span>Настройки графа</span>
            <span id="toggle-icon" style="margin-left: auto;">▼</span>
        </div>

        <div id="settings-content" class="settings-content">
            <div class="setting-item">
                <div class="setting-label">
                    <span>Режим структуры</span>
                </div>
                <select id="select-graph-mode" class="graph-mode-select">
                    <option value="organic">Органика</option>
                    <option value="quartz" selected>Кварц</option>
                </select>
            </div>

            <div class="setting-item setting-toggle-row">
                <span>Эффект свечения</span>
                <input type="checkbox" id="check-glow" style="cursor: pointer; accent-color: var(--accent, #9d66b8);">
            </div>

            <hr class="setting-divider">

            <div class="setting-item">
                <div class="setting-label">
                    <span>Сила отталкивания</span>
                    <span id="val-repel" class="setting-value">120</span>
                </div>
                <input type="range" id="range-repel" min="10" max="300" value="120">
            </div>

            <div class="setting-item">
                <div class="setting-label">
                    <span>Гравитация центра</span>
                    <span id="val-gravity" class="setting-value">0.005</span>
                </div>
                <input type="range" id="range-gravity" min="0" max="0.05" step="0.001" value="0.005">
            </div>

            <div class="setting-item">
                <div class="setting-label">
                    <span>Длина связей</span>
                    <span id="val-link-length" class="setting-value">150</span>
                </div>
                <input type="range" id="range-link-length" min="50" max="400" value="150">
            </div>

            <div class="setting-item">
                <div class="setting-label">
                    <span>Размер узлов</span>
                    <span id="val-node-size" class="setting-value">0</span>
                </div>
                <input type="range" id="range-node-size" min="-10" max="40" value="16">
            </div>
        </div>
    </div>
</div>

<script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<script type="text/javascript" src="{% static 'js/graph.js' %}"></script>
{% endblock %}
