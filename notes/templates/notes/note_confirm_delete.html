{% extends 'base.html' %}

{% block title %}Удаление заметки - Quartz{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-body">
                <h3 class="card-title text-danger">Удалить заметку?</h3>
                <p>Вы уверены, что хотите удалить заметку "<strong>{{ note.title }}</strong>"? Это действие необратимо.</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Да, удалить</button>
                    <a href="{% url 'note_detail' note.pk %}" class="btn btn-secondary">Отмена</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
