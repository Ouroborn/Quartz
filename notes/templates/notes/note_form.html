{% extends 'base.html' %}

{% block title %}{{ title }} - Quartz{% endblock %}

{% block content %}
<div class="form-wrapper">
    <h2>{{ title }}</h2>
    <form method="post">
        {% csrf_token %}
        
        <div class="field-group">
            <label for="{{ form.title.id_for_label }}">{{ form.title.label }}</label>
            {{ form.title }}
            {{ form.title.errors }}
        </div>

        <div class="field-group">
            <label for="{{ form.content.id_for_label }}">{{ form.content.label }}</label>
            {{ form.content }}
            {{ form.content.errors }}
        </div>

        <div class="field-group">
            <label for="{{ form.tags.id_for_label }}">{{ form.tags.label }}</label>
            {{ form.tags }}
            {{ form.tags.errors }}
        </div>

        <div style="display: flex; gap: 15px; margin-top: 20px;">
            <button type="submit" class="btn">Сохранить</button>
            <a href="{% url 'index' %}" class="btn btn-outline">Отмена</a>
        </div>
    </form>
</div>

<style>
    textarea {
        min-height: 400px;
        font-family: 'Courier New', Courier, monospace;
    }
    .field-group {
        margin-bottom: 25px;
    }
    .errorlist {
        color: #ff5555;
        list-style: none;
        padding: 0;
        font-size: 14px;
        margin-top: -15px;
        margin-bottom: 15px;
    }
</style>
{% endblock %}
