{% extends 'base.html' %}

{% block title %}Регистрация - Quartz{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 40px auto; background-color: var(--bg-sidebar); padding: 40px; border-radius: 12px; border: 1px solid var(--border);">
    <h2 style="text-align: center; margin-bottom: 30px;">Регистрация</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">Зарегистрироваться</button>
    </form>
    <div style="text-align: center; margin-top: 20px;">
        <a href="{% url 'login' %}" style="font-size: 14px;">Уже есть аккаунт? Войдите</a>
    </div>
</div>
{% endblock %}
